<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搭子匹配系统 - 本地简化版</title>
    <!-- 加载 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons for UI -->
    <script type="module">
        import { createIcons, Zap, User, Settings, MessageSquare, Loader, CheckCircle, Search, LogOut, LogIn, UserPlus } from 'https://unpkg.com/lucide@latest/dist/esm/lucide.js';
        createIcons({ icons: { Zap, User, Settings, MessageSquare, Loader, CheckCircle, Search, LogOut, LogIn, UserPlus } });
    </script>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-light: #eef2ff;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
        }
        /* 确保输入框在移动端友好 */
        input:required:invalid, textarea:required:invalid {
            border-color: #f87171;
        }
    </style>
</head>
<body class="min-h-screen">

    <header id="header" class="p-4 border-b border-indigo-100 bg-white sticky top-0 z-10 shadow-sm flex justify-between items-center"></header>

    <main id="app-container" class="pb-12"></main>

    <script>
        // --- 全局变量和配置 ---
        // 后端 API 地址，现在指向本地运行的 Flask 服务（端口已改为 5001）
        const BACKEND_MATCH_URL = 'http://127.0.0.1:5001/match';

        // --- UI 常量与枚举 ---
        const SCREENS = {
            LOADING: 'loading',
            AUTH: 'auth',
            PROFILE_SETUP: 'profile_setup',
            MATCHING_LIST: 'matching_list',
            MATCH_DETAILS: 'match_details',
        };

        // 预设选项
        const INTENT_OPTIONS = ['找学习搭子', '寻找情绪共鸣', '拓展兴趣圈', '找社团伙伴', '找活动搭子'];
        const AGE_GROUPS = ['学生 (18-24)', '职场新人 (25-30)', '城市青年 (30+)', '其他'];
        const GENDER_OPTIONS = ['不限', '男', '女'];

        // --- 全局状态 ---
        let currentUserId = localStorage.getItem('currentUserId');
        let userProfile = JSON.parse(localStorage.getItem(`profile_${currentUserId}`)) || null;
        let allProfiles = [];
        let activeScreen = currentUserId ? SCREENS.LOADING : SCREENS.AUTH;
        let loadingMessage = currentUserId ? "正在加载用户资料..." : "请登录或注册...";
        let matchResult = null;

        // --- 辅助函数：状态管理 (简化版) ---

        /** 更新全局状态并重新渲染 */
        function updateState(updates) {
            Object.assign(window, updates);
            renderApp();
        }

        /** 获取所有用户的 profiles (从 localStorage) */
        function getAllProfilesFromLocal() {
            const profiles = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('profile_')) {
                    const profile = JSON.parse(localStorage.getItem(key));
                    if (profile.userId !== currentUserId && profile.UserBioSummary) {
                        profiles.push(profile);
                    }
                }
            }
            // 按时间戳倒序
            profiles.sort((a, b) => b.timestamp - a.timestamp);
            return profiles;
        }

        /**
         * 渲染图标
         * @param {string} name - 图标名称
         * @param {string} [className=''] - CSS class
         */
        function renderIcon(name, className = '') {
            return `<svg class="${className}" data-lucide="${name}"></svg>`;
        }

        // --- UI 组件渲染函数 ---

        function renderHeader() {
            const headerEl = document.getElementById('header');
            const title = getTitle();

            let authControls = '';
            if (currentUserId) {
                authControls = `
                    <div class="flex items-center space-x-3">
                        <div class="flex items-center">
                            ${renderIcon('User', 'w-4 h-4 mr-1')} ID: ${currentUserId.substring(0, 8)}...
                        </div>
                        <button onclick="handleSignOut()" class="flex items-center px-3 py-1 bg-red-500 text-white rounded-full hover:bg-red-600 transition duration-150 text-xs">
                            ${renderIcon('LogOut', 'w-3 h-3 mr-1')} 退出登录
                        </button>
                    </div>
                `;
            }

            headerEl.innerHTML = `
                <h1 class="text-xl font-bold text-indigo-700 flex items-center">
                    ${renderIcon('Zap', 'w-5 h-5 mr-2 text-indigo-500')}
                    ${title}
                </h1>
                <div class="text-xs text-gray-500 flex items-center space-x-3">
                    ${authControls}
                </div>
            `;
            // 重新创建图标实例
            lucide.createIcons({ scope: headerEl });
        }

        function renderLoading() {
            return `
                <div class="flex flex-col items-center justify-center min-h-screen bg-gray-50 p-4 text-center">
                    ${renderIcon('Loader', 'w-8 h-8 animate-spin text-indigo-500 mb-4')}
                    <p class="text-gray-600 font-medium">${loadingMessage}</p>
                </div>
            `;
        }

        // --- 认证屏幕 (AuthScreen) ---
        function renderAuthScreen() {
            return `
                <div class="max-w-sm mx-auto p-6 md:p-8 bg-white rounded-xl shadow-lg my-8">
                    <h2 id="auth-title" class="text-2xl font-bold text-indigo-700 mb-6 text-center">
                        注册新账号
                    </h2>

                    <form id="auth-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">邮箱 (Email)</label>
                            <input type="email" id="auth-email" required class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-3 border focus:border-indigo-500 focus:ring-indigo-500" placeholder="your@example.com" />
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">密码 (Password)</label>
                            <input type="password" id="auth-password" required class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-3 border focus:border-indigo-500 focus:ring-indigo-500" placeholder="至少6位" />
                        </div>

                        <p id="auth-error" class="hidden text-sm text-red-500 bg-red-50 p-2 rounded-lg text-center"></p>

                        <button type="submit" id="auth-button" class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-lg text-sm font-medium text-white transition duration-200 bg-indigo-600 hover:bg-indigo-700">
                            ${renderIcon('UserPlus', 'w-5 h-5 mr-2')} <span id="auth-button-text">注册并登录</span>
                        </button>
                    </form>

                    <div class="mt-6 text-center">
                        <button id="toggle-auth" class="text-sm text-indigo-600 hover:text-indigo-800 font-medium transition duration-150">
                            已有账号？去登录
                        </button>
                    </div>
                </div>
            `;
        }

        function setupAuthListeners() {
            let isRegister = true;
            const form = document.getElementById('auth-form');
            const titleEl = document.getElementById('auth-title');
            const buttonTextEl = document.getElementById('auth-button-text');
            const toggleButton = document.getElementById('toggle-auth');
            const errorEl = document.getElementById('auth-error');
            const buttonEl = document.getElementById('auth-button');

            // 切换模式
            toggleButton.onclick = () => {
                isRegister = !isRegister;
                titleEl.textContent = isRegister ? '注册新账号' : '登录';
                buttonTextEl.textContent = isRegister ? '注册并登录' : '登录';
                toggleButton.textContent = isRegister ? '已有账号？去登录' : '没有账号？去注册';
                errorEl.classList.add('hidden');
                buttonEl.innerHTML = isRegister ? `${renderIcon('UserPlus', 'w-5 h-5 mr-2')} <span id="auth-button-text">注册并登录</span>` : `${renderIcon('LogIn', 'w-5 h-5 mr-2')} <span id="auth-button-text">登录</span>`;
                lucide.createIcons({ scope: buttonEl });
            };

            // 提交处理
            form.onsubmit = (e) => {
                e.preventDefault();
                handleAuth(isRegister);
            };
        }

        function handleAuth(isRegister) {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const errorEl = document.getElementById('auth-error');
            errorEl.classList.add('hidden');

            if (password.length < 6) {
                errorEl.textContent = '密码至少需要6位。';
                errorEl.classList.remove('hidden');
                return;
            }

            // 模拟注册/登录逻辑 (使用 email/password 作为唯一键)
            const userKey = btoa(email); // 简单的 base64 编码作为唯一ID
            const storedUser = localStorage.getItem(userKey);

            if (isRegister) {
                if (storedUser) {
                    errorEl.textContent = '该邮箱已被注册。';
                    errorEl.classList.remove('hidden');
                } else {
                    // 注册成功
                    const newUserProfile = {
                        userId: userKey,
                        email: email,
                        password: btoa(password), // 简单地编码密码，实际应用中绝对不能这样做
                        displayName: `用户_${userKey.substring(0, 4)}`,
                        timestamp: Date.now(),
                    };
                    localStorage.setItem(userKey, JSON.stringify({ password: btoa(password) })); // 仅存储认证信息
                    localStorage.setItem(`profile_${userKey}`, JSON.stringify(newUserProfile)); // 存储完整的 profile

                    updateState({ currentUserId: userKey, userProfile: newUserProfile, activeScreen: SCREENS.PROFILE_SETUP });
                    localStorage.setItem('currentUserId', userKey);
                }
            } else {
                if (storedUser) {
                    const storedAuth = JSON.parse(storedUser);
                    if (storedAuth && storedAuth.password === btoa(password)) {
                        // 登录成功
                        const profile = JSON.parse(localStorage.getItem(`profile_${userKey}`));
                        updateState({ currentUserId: userKey, userProfile: profile, activeScreen: profile.UserBioSummary ? SCREENS.MATCHING_LIST : SCREENS.PROFILE_SETUP });
                        localStorage.setItem('currentUserId', userKey);
                    } else {
                        errorEl.textContent = '密码错误。';
                        errorEl.classList.remove('hidden');
                    }
                } else {
                    errorEl.textContent = '该用户未注册。';
                    errorEl.classList.remove('hidden');
                }
            }
        }

        // --- 登出 ---
        function handleSignOut() {
            localStorage.removeItem('currentUserId');
            updateState({
                currentUserId: null,
                userProfile: null,
                allProfiles: [],
                matchResult: null,
                activeScreen: SCREENS.AUTH
            });
        }


        // --- Profile Setup 界面 ---
        function renderProfileSetup() {
            const currentProfile = userProfile || {};

            const intentOptionsHtml = INTENT_OPTIONS.map(opt => `<option value="${opt}" ${currentProfile.primaryIntent === opt ? 'selected' : ''}>${opt}</option>`).join('');
            const ageGroupHtml = AGE_GROUPS.map(opt => `<option value="${opt}" ${currentProfile.ageGroup === opt ? 'selected' : ''}>${opt}</option>`).join('');
            const genderOptionsHtml = GENDER_OPTIONS.map(opt => `<option value="${opt}" ${currentProfile.targetGender === opt ? 'selected' : ''}>${opt}</option>`).join('');

            return `
                <div class="max-w-xl mx-auto p-4 md:p-8 bg-white rounded-xl shadow-lg my-8">
                    <h2 class="text-2xl font-semibold text-gray-800 mb-6 flex items-center">
                        ${renderIcon('Settings', 'w-5 h-5 mr-2')} 完善您的个人资料 (MVP)
                    </h2>
                    <p class="text-gray-600 mb-6">您的资料越详细，AI 匹配的精准度越高。</p>

                    <form id="profile-form" class="space-y-4">

                        <div>
                            <label class="block text-sm font-medium text-gray-700">昵称/展示名称</label>
                            <input type="text" name="displayName" value="${currentProfile.displayName || ''}" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-3 border focus:border-indigo-500 focus:ring-indigo-500" placeholder="用户_${currentUserId.substring(0, 4)}" />
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700">主要匹配意图 <span class="text-red-500">*</span></label>
                            <select name="primaryIntent" required class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-3 border focus:border-indigo-500 focus:ring-indigo-500">
                                <option value="" disabled ${!currentProfile.primaryIntent ? 'selected' : ''}>请选择您的目的</option>
                                ${intentOptionsHtml}
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700">年龄段</label>
                            <select name="ageGroup" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-3 border focus:border-indigo-500 focus:ring-indigo-500">
                                <option value="" disabled ${!currentProfile.ageGroup ? 'selected' : ''}>请选择</option>
                                ${ageGroupHtml}
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700">期望的伙伴性别</label>
                            <select name="targetGender" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-3 border focus:border-indigo-500 focus:ring-indigo-500">
                                ${genderOptionsHtml}
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700">
                                个性化自述总结 (UserBioSummary) <span class="text-red-500">*</span>
                            </label>
                            <p class="text-xs text-gray-500 mb-1">
                                (请包含：专业/职业、兴趣爱好、学习/工作习惯、您希望在伙伴身上找到的特质)
                            </p>
                            <textarea name="UserBioSummary" rows="6" required placeholder="例如：我是在读金融专业的学生..." class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-3 border resize-none focus:border-indigo-500 focus:ring-indigo-500">${currentProfile.UserBioSummary || ''}</textarea>
                        </div>

                        <button type="submit" id="save-button" class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-lg text-sm font-medium text-white transition duration-200 bg-indigo-600 hover:bg-indigo-700">
                            ${renderIcon('Zap', 'w-5 h-5 mr-2')} <span id="save-button-text">保存并开始匹配</span>
                        </button>
                    </form>
                    <p id="save-message" class="mt-4 text-center text-sm text-green-600 hidden"></p>
                </div>
            `;
        }

        function setupProfileListeners() {
            const form = document.getElementById('profile-form');
            form.onsubmit = (e) => {
                e.preventDefault();
                handleSaveProfile();
            };
        }

        function handleSaveProfile() {
            const form = document.getElementById('profile-form');
            const data = {};
            new FormData(form).forEach((value, key) => { data[key] = value; });

            if (!data.UserBioSummary || !data.primaryIntent) {
                alert("请填写您的意图和自我介绍，这是匹配的基础！");
                return;
            }

            const button = document.getElementById('save-button');
            const buttonText = document.getElementById('save-button-text');
            const messageEl = document.getElementById('save-message');

            button.disabled = true;
            buttonText.textContent = '正在保存...';
            button.classList.add('bg-indigo-400', 'cursor-not-allowed');
            messageEl.classList.add('hidden');

            const dataToSave = {
                ...userProfile, // 保留旧数据
                ...data, // 覆盖新数据
                userId: currentUserId,
                displayName: data.displayName || `用户_${currentUserId.substring(0, 4)}`,
                timestamp: Date.now(),
            };

            // 模拟数据库保存 (保存到 localStorage)
            localStorage.setItem(`profile_${currentUserId}`, JSON.stringify(dataToSave));

            // 更新状态并跳转
            updateState({ userProfile: dataToSave, activeScreen: SCREENS.MATCHING_LIST });

            buttonText.textContent = '保存成功！进入匹配';
            messageEl.textContent = '资料已更新，您可以开始匹配了！';
            messageEl.classList.remove('hidden');
            lucide.createIcons({ scope: button }); // 重新创建图标实例
        }

        // --- Matching List 界面 ---

        function renderMatchingList() {
            const profiles = getAllProfilesFromLocal();
            updateState({ allProfiles: profiles }); // 更新全局列表

            if (profiles.length === 0) {
                return `
                    <div class="text-center p-8 mt-10 max-w-lg mx-auto bg-white rounded-xl shadow-lg">
                        ${renderIcon('Search', 'w-10 h-10 text-gray-400 mx-auto mb-4')}
                        <h2 class="text-xl font-semibold text-gray-700">暂无其他用户资料</h2>
                        <p class="text-gray-500 mt-2">请在浏览器中打开新的匿名窗口或使用不同邮箱注册，创建新的用户资料。</p>
                        <p class="text-sm text-indigo-500 mt-4">您的用户 ID: ${currentUserId}</p>
                    </div>
                `;
            }

            const profileCards = profiles.map((profile, index) => `
                <div class="bg-white p-5 rounded-xl shadow-md hover:shadow-lg transition duration-300 border border-gray-100 flex flex-col" data-index="${index}">
                    <div class="flex items-center mb-3">
                        ${renderIcon('User', 'w-6 h-6 text-indigo-500 mr-3 p-1 bg-indigo-100 rounded-full')}
                        <h3 class="font-semibold text-lg text-gray-800 truncate" title="${profile.userId}">
                            ${profile.displayName || `用户 ID: ${profile.userId.substring(0, 8)}...`}
                        </h3>
                    </div>

                    <div class="space-y-1 text-sm text-gray-600 mb-4">
                        <p><span class="font-medium text-gray-700">意图:</span> ${profile.primaryIntent || '未填写'}</p>
                        <p><span class="font-medium text-gray-700">年龄段:</span> ${profile.ageGroup || '未填写'}</p>
                        <p class="line-clamp-3 text-sm mt-2"><span class="font-medium text-gray-700">自述:</span> ${profile.UserBioSummary}</p>
                        <p class="text-xs text-gray-400 pt-2">最后更新: ${new Date(profile.timestamp).toLocaleDateString()}</p>
                    </div>

                    <button onclick="handleMatchClick(${index})" class="mt-auto w-full flex items-center justify-center py-2 px-3 text-sm font-medium rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 transition duration-150 shadow-md">
                        ${renderIcon('Zap', 'w-4 h-4 mr-2')}
                        AI 匹配并生成评语
                    </button>
                </div>
            `).join('');

            return `
                <div class="p-4 md:p-8">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6">可匹配的伙伴 (${profiles.length}人)</h2>
                    <p class="text-sm text-gray-600 mb-6 p-3 bg-indigo-50 rounded-lg border border-indigo-200">
                        <span class="font-semibold">您的个人资料概览:</span> ${userProfile.primaryIntent || '未设置'} | ${userProfile.ageGroup || '未设置'} | ${userProfile.UserBioSummary.substring(0, 50)}...
                    </p>

                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${profileCards}
                    </div>
                </div>
            `;
        }

        // 匹配按钮点击处理
        async function handleMatchClick(index) {
            const targetProfile = allProfiles[index];
            if (!targetProfile) return;

            updateState({ activeScreen: SCREENS.LOADING, loadingMessage: `正在与 ${targetProfile.displayName || targetProfile.userId.substring(0, 8)}... 进行 AI 匹配...` });

            await getLLMMatchingRationale(targetProfile);
        }

        // --- LLM 匹配核心逻辑 (现在调用本地 Flask 后端) ---
        async function getLLMMatchingRationale(targetProfile) {
            const payload = {
                userA: userProfile,
                userB: targetProfile
            };

            try {
                // 向本地 Flask 后端发送请求
                const response = await fetch(BACKEND_MATCH_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const errorJson = await response.json().catch(() => ({ message: '后端返回错误但无法解析详情。' }));
                    throw new Error(`后端服务错误 (${response.status}): ${errorJson.message || '请检查 Flask 服务是否启动。'}`);
                }

                const parsedJson = await response.json();

                // 确保返回的结构与预期一致
                if (typeof parsedJson.matchScore !== 'number') {
                    throw new Error("后端返回的匹配数据格式不正确。");
                }

                // 更新状态并跳转到详情页
                updateState({
                    matchResult: {
                        ...parsedJson,
                        targetProfileId: targetProfile.userId,
                        targetDisplayName: targetProfile.displayName || targetProfile.userId,
                    },
                    activeScreen: SCREENS.MATCH_DETAILS
                });
                updateState({ loadingMessage: "匹配成功！" });

            } catch (error) {
                console.error("Matching Error:", error);
                // 发生错误时，返回匹配列表并显示错误信息
                updateState({
                    activeScreen: SCREENS.MATCHING_LIST,
                    loadingMessage: `匹配失败: ${error.message}`
                });
            }
        }


        // --- Match Details 界面 ---

        function renderMatchDetails() {
            if (!matchResult) return '';
            const { matchScore, matchLevel, detailedRationale, targetDisplayName } = matchResult;
            const { overlapPoints, complementaryPoints, mismatchPoints, summary } = detailedRationale || {};

            // 评分卡颜色
            const scoreColor = matchScore >= 80 ? 'bg-green-500' : matchScore >= 60 ? 'bg-yellow-500' : 'bg-red-500';
            const levelColor = matchScore >= 80 ? 'text-green-600' : matchScore >= 60 ? 'text-yellow-600' : 'text-red-600';

            const renderPoints = (title, points, iconName, color) => `
                <div class="mb-6 border-l-4 p-4 rounded-r-lg" style="border-color: ${color}; background-color: ${color}10;">
                    <h3 class="text-lg font-semibold mb-3 flex items-center text-gray-700">
                        ${renderIcon(iconName, 'w-5 h-5 mr-2')}
                        ${title}
                    </h3>
                    <ul class="space-y-2 text-gray-700 list-disc list-inside">
                        ${points && points.length > 0 ? points.map(p => `<li class="text-sm">${p}</li>`).join('') : `<li class="text-sm italic text-gray-500">无明显发现。</li>`}
                    </ul>
                </div>
            `;

            return `
                <div class="p-4 md:p-8 max-w-3xl mx-auto">
                    <button onclick="updateState({activeScreen: SCREENS.MATCHING_LIST})" class="text-indigo-600 hover:text-indigo-800 font-medium mb-6 flex items-center transition duration-150">
                        &larr; 返回匹配列表
                    </button>

                    <div class="bg-white p-8 rounded-xl shadow-2xl border border-indigo-100">
                        <h2 class="text-3xl font-bold text-gray-800 mb-6 border-b pb-3">
                            AI 伙伴匹配报告 - ${targetDisplayName}
                        </h2>

                        <!-- 评分卡 -->
                        <div class="flex items-center justify-between p-5 mb-6 rounded-xl bg-gray-50 border border-gray-200">
                            <div class="flex flex-col">
                                <span class="text-xl font-medium text-gray-600">匹配得分 (0-100)</span>
                                <span class="text-4xl font-extrabold mt-1 ${levelColor}">${matchScore}</span>
                            </div>
                            <div class="w-24 h-24 flex items-center justify-center rounded-full text-white font-bold text-2xl shadow-lg ${scoreColor}">
                                ${matchLevel}
                            </div>
                        </div>

                        <!-- 评语总结 -->
                        <div class="bg-indigo-50 p-6 rounded-xl mb-6 border border-indigo-200">
                            <h3 class="text-xl font-semibold text-indigo-700 mb-3 flex items-center">
                                ${renderIcon('MessageSquare', 'w-5 h-5 mr-2')} AI 专家评语
                            </h3>
                            <p class="text-gray-700 leading-relaxed italic">${summary}</p>
                        </div>

                        <!-- 详细分析 -->
                        <div class="space-y-4">
                            ${renderPoints("重叠契合点 (Overlap Points)", overlapPoints, 'CheckCircle', 'rgb(16, 185, 129)')}
                            ${renderPoints("互补潜力点 (Complementary Points)", complementaryPoints, 'Zap', 'rgb(99, 102, 241)')}
                            ${renderPoints("潜在不合拍点 (Mismatch Points)", mismatchPoints, 'Settings', 'rgb(249, 115, 22)')}
                        </div>
                    </div>
                </div>
            `;
        }

        // --- 主渲染逻辑 ---

        function getTitle() {
            switch (activeScreen) {
                case SCREENS.AUTH: return '登录/注册';
                case SCREENS.PROFILE_SETUP: return '完善资料';
                case SCREENS.MATCHING_LIST: return '寻找搭子';
                case SCREENS.MATCH_DETAILS: return '匹配报告';
                default: return '搭子匹配系统';
            }
        }

        function renderApp() {
            renderHeader();
            const appContainer = document.getElementById('app-container');
            let contentHtml = '';

            switch (activeScreen) {
                case SCREENS.LOADING:
                    contentHtml = renderLoading();
                    break;
                case SCREENS.AUTH:
                    contentHtml = renderAuthScreen();
                    break;
                case SCREENS.PROFILE_SETUP:
                    contentHtml = renderProfileSetup();
                    break;
                case SCREENS.MATCHING_LIST:
                    contentHtml = renderMatchingList();
                    break;
                case SCREENS.MATCH_DETAILS:
                    contentHtml = renderMatchDetails();
                    break;
            }

            appContainer.innerHTML = contentHtml;
            lucide.createIcons({ scope: appContainer });

            // 附加事件监听器
            if (activeScreen === SCREENS.AUTH) {
                setupAuthListeners();
            } else if (activeScreen === SCREENS.PROFILE_SETUP) {
                setupProfileListeners();
            }
        }

        // 首次加载
        window.onload = () => {
            // 在应用启动时重新检查用户资料，确保状态一致
            if (currentUserId) {
                userProfile = JSON.parse(localStorage.getItem(`profile_${currentUserId}`));
                if (userProfile && userProfile.UserBioSummary) {
                    updateState({ activeScreen: SCREENS.MATCHING_LIST });
                } else {
                    updateState({ activeScreen: SCREENS.PROFILE_SETUP });
                }
            } else {
                updateState({ activeScreen: SCREENS.AUTH });
            }
        };

        // 暴露全局函数供 HTML 元素调用
        window.handleSignOut = handleSignOut;
        window.handleMatchClick = handleMatchClick;
    </script>
</body>
</html>
